version: '3.5'

services:
  prestashop:
    build:
      context: ./
      dockerfile: prestashop
    ports:
      - "80:80"
      - "443:443"
      - "9000"
    networks:
      - bridge
    volumes:
      - ../docker/config/php/php.ini:/usr/local/etc/php/php.ini:cached
      - ${PWD}:/var/www/html/
  db:
    build:
      context: ./
      dockerfile: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    networks:
      - bridge
    restart: on-failure
    volumes:
      - ${PWD}/db:/var/lib/mysql:cached
networks:
  bridge:
    driver: bridge